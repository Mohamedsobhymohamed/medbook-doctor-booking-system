<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Payment History - MedBook</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head>
<body>
<div class="navbar">
  <a href="/" class="navbar-brand"><div class="brand-icon">🏥</div><div class="brand-text">Med<span>Book</span></div></a>
  <ul class="nav-links"><li><a href="{{ url_for('patient.dashboard') }}">Dashboard</a></li><li><a href="{{ url_for('auth.logout') }}">Logout</a></li></ul>
</div>
<div class="main-content">
  <h2 class="page-title">Payment History</h2>
  <div class="card">
    <div class="card-body">
      {% if payments %}
      <table>
        <thead><tr><th>Date</th><th>Amount</th><th>Status</th></tr></thead>
        <tbody>
          {% for p in payments %}
          <tr>
            <td>{{ p.created_at.strftime("%Y-%m-%d") }}</td>
            <td>${{ p.amount }}</td>
            <td><span class="badge badge-{{ 'paid' if p.payment_status=='paid' else 'pending' }}">{{ p.payment_status }}</span></td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
      {% else %}
      <div class="empty-state"><div class="empty-title">No payment history</div></div>
      {% endif %}
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body></html>
