<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Profile - MedBook</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head>
<body>
<div class="navbar">
  <a href="/" class="navbar-brand"><div class="brand-icon">🏥</div><div class="brand-text">Med<span>Book</span></div></a>
  <ul class="nav-links"><li><a href="{{ url_for('auth.logout') }}">Logout</a></li></ul>
</div>
<div class="main-content" style="max-width:600px;margin:0 auto;">
  <h2 class="page-title">My Profile</h2>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for c,m in messages %}<div class="flash flash-{{ c }}">{{ m }}</div>{% endfor %}{% endif %}
  {% endwith %}
  <div class="card">
    <div class="card-body">
      <form method="POST">
        <div class="form-group"><label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" value="{{ current_user.name }}" required></div>
        <div class="form-group"><label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control" value="{{ current_user.phone or '' }}"></div>
        {% if current_user.role == 'doctor' and current_user.doctor_profile %}
        <div class="form-group"><label class="form-label">Bio</label>
          <textarea name="bio" class="form-control">{{ current_user.doctor_profile.bio or '' }}</textarea></div>
        <div class="form-group"><label class="form-label">Years Experience</label>
          <input type="number" name="years_experience" class="form-control" value="{{ current_user.doctor_profile.years_experience }}"></div>
        {% endif %}
        <div class="form-group"><label class="form-label">New Password (leave blank to keep current)</label>
          <input type="password" name="new_password" class="form-control"></div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body></html>
